services:

  # ── Contenedor principal — Cursor se conecta aquí ──────────────────
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    user: root
    entrypoint: ["/usr/local/share/flow/workspace-entrypoint.sh"]
    volumes:
      - ..:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
      - workspace-pnpm-store:/home/vscode/.local/share/pnpm/store
    working_dir: /workspace
    command: sleep infinity
    networks:
      - workspace

  # ── Backend: PHP 8.2 + Laravel 11 ─────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    volumes:
      - ../backend:/app:cached
      - backend-vendor:/app/vendor
    working_dir: /app
    command: sleep infinity
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: app_dev
      DB_USERNAME: app
      DB_PASSWORD: app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - workspace

  # ── Frontend: Vite + React ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    volumes:
      - ../frontend:/app:cached
      - frontend-node-modules:/app/node_modules
      - frontend-pnpm-store:/home/node/.local/share/pnpm/store
    working_dir: /app
    command: sleep infinity
    ports:
      - "5173:5173"
    networks:
      - workspace

  # ── Base de datos: MySQL 8 ─────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    volumes:
      - workspace-mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_dev
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - workspace

volumes:
  workspace-mysql-data:
  backend-vendor:
  frontend-node-modules:
  frontend-pnpm-store:
  workspace-pnpm-store:

networks:
  workspace:
