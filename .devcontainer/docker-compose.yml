services:

  # ── Contenedor principal — Cursor se conecta aquí ──────────────────
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    user: root
    entrypoint: ["/usr/local/share/flow/workspace-entrypoint.sh"]
    volumes:
      - ..:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
      - workspace-pnpm-store:/home/vscode/.local/share/pnpm/store
    working_dir: /workspace
    command: sleep infinity
    networks:
      - workspace

volumes:
  workspace-pnpm-store:

networks:
  workspace:
