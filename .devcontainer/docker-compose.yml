services:

  # ── Contenedor principal — Cursor se conecta aquí ──────────────────
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    user: root
    entrypoint: ["/usr/local/share/flow/workspace-entrypoint.sh"]
    volumes:
      - ..:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
      - workspace-pnpm-store:/home/vscode/.local/share/pnpm/store
    working_dir: /workspace
    command: sleep infinity
    networks:
      - workspace

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env.generated
    working_dir: /workspace/gateway
    command: uvicorn app.main:app --host 0.0.0.0 --port 8010
    ports:
      - "${SOFTOS_GATEWAY_HOST_PORT:-8010}:8010"
    networks:
      - workspace

volumes:
  workspace-pnpm-store:

networks:
  workspace:
