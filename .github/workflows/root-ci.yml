name: Root CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  spec-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: python3 -m pip install --upgrade pip PyYAML

      - name: Flow doctor
        run: python3 ./flow doctor

      - name: Repo/Submodule doctor
        run: python3 ./flow submodule doctor --json

      - name: Secrets doctor
        run: python3 ./flow secrets doctor --json

      - name: Secret scan
        run: python3 ./flow secrets scan --all --json

      - name: Spec-driven CI
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python3 ./flow ci spec --changed --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.sha }}"
            python3 ./flow drift check --changed --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.sha }}" --json
            python3 ./flow contract verify --changed --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.sha }}" --json
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            python3 ./flow ci spec --changed --base "${{ github.event.before }}" --head "${{ github.sha }}"
            python3 ./flow drift check --changed --base "${{ github.event.before }}" --head "${{ github.sha }}" --json
            python3 ./flow contract verify --changed --base "${{ github.event.before }}" --head "${{ github.sha }}" --json
          else
            python3 ./flow ci spec --all
            python3 ./flow drift check --all --json
            python3 ./flow contract verify --all --json
          fi

      - name: Repo CI
        run: python3 ./flow ci repo --all

      - name: Upload CI reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow-ci-reports
          path: .flow/reports/

  integration-smoke:
    runs-on: ubuntu-latest
    needs:
      - spec-governance
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: python3 -m pip install --upgrade pip PyYAML

      - name: Build stack
        run: python3 ./flow stack build

      - name: Start stack
        run: python3 ./flow stack up

      - name: Integration smoke
        run: python3 ./flow ci integration --profile smoke

      - name: Upload integration reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow-integration-reports
          path: .flow/reports/
