name: Root CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  spec-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          submodules: false
          fetch-depth: 0

      - name: Normalize and hydrate submodules
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: ./scripts/ci/normalize_gitmodules.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: python3 -m pip install --upgrade pip PyYAML

      - name: Flow signature drift guard
        run: python3 ./scripts/ci/check_flow_signature_drift.py

      - name: Flow doctor
        run: python3 ./flow doctor

      - name: Repo/Submodule doctor
        run: python3 ./flow submodule doctor --json

      - name: Secrets doctor
        run: python3 ./flow secrets doctor --json

      - name: Secret scan
        run: python3 ./flow secrets scan --all --json

      - name: Boilerplate guardrail
        shell: bash
        run: |
          set -euo pipefail
          HEAD_SHA="${{ github.sha }}"
          BASE_SHA=""

          ensure_commit() {
            local sha="$1"
            if [ -z "$sha" ] || [ "$sha" = "0000000000000000000000000000000000000000" ]; then
              return 1
            fi
            if git cat-file -e "${sha}^{commit}" 2>/dev/null; then
              return 0
            fi
            git fetch --no-tags origin "${sha}" || true
            git cat-file -e "${sha}^{commit}" 2>/dev/null
          }

          has_merge_base() {
            local base_sha="$1"
            local head_sha="$2"
            git merge-base "$base_sha" "$head_sha" >/dev/null 2>&1
          }

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CANDIDATE_BASE="${{ github.event.pull_request.base.sha }}"
            if ensure_commit "$CANDIDATE_BASE" && ensure_commit "$HEAD_SHA"; then
              BASE_SHA="$CANDIDATE_BASE"
            fi
          else
            CANDIDATE_BASE="${{ github.event.before }}"
            if ensure_commit "$CANDIDATE_BASE" && ensure_commit "$HEAD_SHA"; then
              BASE_SHA="$CANDIDATE_BASE"
            elif PARENT_SHA="$(git rev-parse "${HEAD_SHA}^" 2>/dev/null)"; then
              BASE_SHA="$PARENT_SHA"
            fi
          fi

          if [ -n "$BASE_SHA" ]; then
            scripts/guardrails/check_boilerplate_protected_paths.sh --base "$BASE_SHA" --head "$HEAD_SHA"
          else
            echo "Skipping boilerplate guardrail: no resolvable base commit."
          fi

      - name: Spec-driven CI
        shell: bash
        run: |
          set -euo pipefail
          HEAD_SHA="${{ github.sha }}"
          MODE="all"
          BASE_SHA=""

          ensure_commit() {
            local sha="$1"
            if [ -z "$sha" ] || [ "$sha" = "0000000000000000000000000000000000000000" ]; then
              return 1
            fi
            if git cat-file -e "${sha}^{commit}" 2>/dev/null; then
              return 0
            fi
            git fetch --no-tags origin "${sha}" || true
            git cat-file -e "${sha}^{commit}" 2>/dev/null
          }

          has_merge_base() {
            local base_sha="$1"
            local head_sha="$2"
            git merge-base "$base_sha" "$head_sha" >/dev/null 2>&1
          }

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CANDIDATE_BASE="${{ github.event.pull_request.base.sha }}"
            if ensure_commit "$CANDIDATE_BASE" && ensure_commit "$HEAD_SHA"; then
              MODE="changed"
              BASE_SHA="$CANDIDATE_BASE"
            fi
          else
            CANDIDATE_BASE="${{ github.event.before }}"
            if ensure_commit "$CANDIDATE_BASE" && ensure_commit "$HEAD_SHA"; then
              MODE="changed"
              BASE_SHA="$CANDIDATE_BASE"
            elif PARENT_SHA="$(git rev-parse "${HEAD_SHA}^" 2>/dev/null)"; then
              MODE="changed"
              BASE_SHA="$PARENT_SHA"
              echo "Falling back to HEAD parent as base: ${BASE_SHA}"
            fi
          fi

          if [ "$MODE" = "changed" ]; then
            if ! has_merge_base "$BASE_SHA" "$HEAD_SHA"; then
              echo "No merge-base between ${BASE_SHA} and ${HEAD_SHA}. Trying HEAD parent fallback."
              if PARENT_SHA="$(git rev-parse "${HEAD_SHA}^" 2>/dev/null)"; then
                if ensure_commit "$PARENT_SHA" && has_merge_base "$PARENT_SHA" "$HEAD_SHA"; then
                  BASE_SHA="$PARENT_SHA"
                  echo "Using HEAD parent as base: ${BASE_SHA}"
                else
                  echo "HEAD parent is not usable as base. Falling back to all specs."
                  MODE="all"
                fi
              else
                echo "No HEAD parent available. Falling back to all specs."
                MODE="all"
              fi
            fi
          fi

          if [ "$MODE" = "changed" ]; then
            python3 ./flow ci spec --changed --base "$BASE_SHA" --head "$HEAD_SHA"
            python3 ./flow drift check --changed --base "$BASE_SHA" --head "$HEAD_SHA" --json
            python3 ./flow contract verify --changed --base "$BASE_SHA" --head "$HEAD_SHA" --json
          else
            python3 ./flow ci spec --all
            python3 ./flow drift check --all --json
            python3 ./flow contract verify --all --json
          fi

      - name: Upload CI reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow-ci-reports
          path: .flow/reports/

  discover-repo-ci-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_repos: ${{ steps.discover.outputs.has_repos }}
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          submodules: false
          fetch-depth: 0

      - name: Discover repo/runtime matrix
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/repo_ci_matrix.out
          import json
          from pathlib import Path

          workspace = json.loads(Path("workspace.config.json").read_text(encoding="utf-8"))
          runtimes_registry = {}
          runtimes_index = {}
          runtimes_file = Path("workspace.runtimes.json")
          if runtimes_file.exists():
              try:
                  runtimes_registry = json.loads(runtimes_file.read_text(encoding="utf-8")).get("runtimes", {})
              except Exception:
                  runtimes_registry = {}

          def load_runtime_pack(runtime_name: str):
              if not runtime_name:
                  return {}
              if runtime_name in runtimes_index:
                  return runtimes_index[runtime_name]
              source = ""
              entry = runtimes_registry.get(runtime_name, {})
              if isinstance(entry, dict):
                  source = str(entry.get("source", "")).strip()
              candidates = []
              if source:
                  candidates.append(Path(source))
              candidates.append(Path("runtimes") / f"{runtime_name}.runtime.json")
              for candidate in candidates:
                  if not candidate.is_file():
                      continue
                  try:
                      payload = json.loads(candidate.read_text(encoding="utf-8"))
                      if isinstance(payload, dict):
                          runtimes_index[runtime_name] = payload
                          return payload
                  except Exception:
                      continue
              runtimes_index[runtime_name] = {}
              return {}

          def infer_tools(runtime_name: str, repo_cfg: dict, runtime_pack: dict):
              runner = str(repo_cfg.get("test_runner", runtime_pack.get("test_runner", ""))).strip().lower()
              ci_cfg = repo_cfg.get("ci")
              if not isinstance(ci_cfg, dict):
                  ci_cfg = runtime_pack.get("ci", {})
              tokens = []
              if isinstance(ci_cfg, dict):
                  for step in ("install", "lint", "test", "build"):
                      cmd = ci_cfg.get(step)
                      if isinstance(cmd, list):
                          tokens.extend(str(part).strip().lower() for part in cmd if isinstance(part, str))
              runtime_lower = runtime_name.lower()
              token_set = set(tokens)
              needs_node = (
                  runner == "pnpm"
                  or any(item in token_set for item in {"pnpm", "npm", "npx", "node"})
                  or "node" in runtime_lower
              )
              needs_php = (
                  runner == "php"
                  or any(item in token_set for item in {"php", "composer", "phpunit", "artisan"})
                  or "php" in runtime_lower
              )
              needs_go = (
                  runner == "go"
                  or "go" in token_set
                  or runtime_lower.startswith("go")
                  or runtime_lower.endswith("-go")
              )
              needs_python = (
                  runner == "pytest"
                  or any(item in token_set for item in {"python", "python3", "pip", "pip3", "pytest", "uv"})
                  or "python" in runtime_lower
              )
              return needs_node, needs_php, needs_go, needs_python

          include = []
          repos = workspace.get("repos", {})
          for repo_name in sorted(repos):
              repo_cfg = repos.get(repo_name, {})
              if not isinstance(repo_cfg, dict):
                  continue
              if str(repo_cfg.get("kind", "")).strip().lower() == "root":
                  continue
              runtime_name = str(repo_cfg.get("runtime", "")).strip()
              runtime_pack = load_runtime_pack(runtime_name)
              needs_node, needs_php, needs_go, needs_python = infer_tools(runtime_name, repo_cfg, runtime_pack)
              include.append(
                  {
                      "repo": repo_name,
                      "path": str(repo_cfg.get("path", repo_name)).strip() or repo_name,
                      "runtime": runtime_name or "unknown",
                      "needs_node": needs_node,
                      "needs_php": needs_php,
                      "needs_go": needs_go,
                      "needs_python": needs_python,
                  }
              )

          print("matrix=" + json.dumps({"include": include}, separators=(",", ":")))
          print("has_repos=" + ("true" if include else "false"))
          PY
          cat /tmp/repo_ci_matrix.out >> "$GITHUB_OUTPUT"

  repo-ci:
    runs-on: ubuntu-latest
    needs:
      - spec-governance
      - discover-repo-ci-matrix
    if: needs.discover-repo-ci-matrix.outputs.has_repos == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-repo-ci-matrix.outputs.matrix) }}
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          submodules: false
          fetch-depth: 0

      - name: Normalize and hydrate submodules
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: ./scripts/ci/normalize_gitmodules.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Go
        if: matrix.needs_go == true
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Node
        if: matrix.needs_node == true
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        if: matrix.needs_node == true
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup PHP
        if: matrix.needs_php == true
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, bcmath, curl, sqlite3
          tools: composer:v2

      - name: Install Python deps
        run: python3 -m pip install --upgrade pip PyYAML

      - name: Node lockfile precheck
        if: matrix.needs_node == true
        shell: bash
        run: |
          set -euo pipefail
          repo_path="${{ matrix.path }}"
          has_lock=0
          for candidate in \
            "${repo_path}/pnpm-lock.yaml" \
            "${repo_path}/code/pnpm-lock.yaml" \
            "${repo_path}/src/pnpm-lock.yaml"; do
            if [ -f "$candidate" ]; then
              has_lock=1
              echo "Found pnpm lockfile: $candidate"
              break
            fi
          done
          if [ "$has_lock" -eq 0 ]; then
            echo "::warning::No pnpm-lock.yaml found for '${{ matrix.repo }}'. CI dependency resolution is non-deterministic and may break tests unexpectedly."
          fi

      - name: Prepare PHP .env
        if: matrix.needs_php == true
        shell: bash
        run: |
          set -euo pipefail
          repo_path="${{ matrix.path }}"
          for candidate in "${repo_path}" "${repo_path}/src" "${repo_path}/code"; do
            if [ -f "${candidate}/.env.example" ] && [ ! -f "${candidate}/.env" ]; then
              cp "${candidate}/.env.example" "${candidate}/.env"
              echo "Created ${candidate}/.env from .env.example"
              break
            fi
          done

      - name: Repo CI
        id: repo_ci
        continue-on-error: true
        shell: bash
        env:
          FLOW_SKIP_COMPOSE_WRAP: "1"
        run: |
          set -euo pipefail
          rc=0
          python3 ./flow ci repo "${{ matrix.repo }}" || rc=$?
          echo "exit_code=${rc}" >> "$GITHUB_OUTPUT"

      - name: Repo CI report summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          report_md=".flow/reports/ci/repo-${{ matrix.repo }}.md"
          report_json=".flow/reports/ci/repo-${{ matrix.repo }}.json"
          echo "Repo CI exit_code: ${{ steps.repo_ci.outputs.exit_code }}"
          if [ -f "$report_md" ]; then
            echo "---- ${report_md} ----"
            cat "$report_md"
          fi
          if [ -f "$report_json" ]; then
            echo "---- ${report_json} ----"
            cat "$report_json"
          fi

      - name: Enforce Repo CI result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.repo_ci.outputs.exit_code }}" != "0" ]; then
            echo "Repo CI failed for '${{ matrix.repo }}'. See report summary above."
            exit 1
          fi

      - name: Upload CI reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow-ci-reports-${{ matrix.repo }}
          path: .flow/reports/

  integration-smoke:
    runs-on: ubuntu-latest
    needs:
      - spec-governance
      - discover-repo-ci-matrix
      - repo-ci
    if: needs.spec-governance.result == 'success' && (needs.discover-repo-ci-matrix.outputs.has_repos != 'true' || needs.repo-ci.result == 'success')
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          submodules: false
          fetch-depth: 0

      - name: Normalize and hydrate submodules
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: ./scripts/ci/normalize_gitmodules.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: python3 -m pip install --upgrade pip PyYAML

      - name: Build stack
        run: python3 ./flow stack build

      - name: Start stack
        run: python3 ./flow stack up

      - name: Integration smoke
        run: python3 ./flow ci integration --profile smoke

      - name: Upload integration reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flow-integration-reports
          path: .flow/reports/
