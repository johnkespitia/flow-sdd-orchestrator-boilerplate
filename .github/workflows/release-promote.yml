name: Release Promote

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to promote
        required: true
        type: string
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - preview
          - staging
          - production
      provider:
        description: Optional release provider id
        required: false
        default: local-hooks
        type: string
      approver:
        description: Required for staging and production
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Promote release
        shell: bash
        run: |
          set -euo pipefail
          args=(release promote --version "${{ inputs.version }}" --env "${{ inputs.environment }}" --provider "${{ inputs.provider }}")
          if [ -n "${{ inputs.approver }}" ]; then
            args+=(--approver "${{ inputs.approver }}")
          fi
          python3 ./flow "${args[@]}"
          python3 ./flow release status --version "${{ inputs.version }}"

      - name: Upload promotion artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-promotion-${{ inputs.version }}-${{ inputs.environment }}
          path: releases/
